<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Кантование куба с ориентацией</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #222;
            color: white;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden;
            overscroll-behavior: none;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
        }

        #app {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        #viewport {
            position: relative;
            flex: 1 1 auto;
            min-width: 0;
            min-height: 0;
            width: 100%;
            overflow: hidden;
            touch-action: none;
        }

        #viewport canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        #controls {
            flex: 0 0 auto;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 10px max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
            background: rgba(34, 34, 34, 0.92);
            box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.25);
        }

        button {
            min-width: 78px;
            min-height: 44px;
            padding: 8px 14px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background: #3498db;
            color: white;
            border-radius: 6px;
            transition: background 0.3s;
            touch-action: manipulation;
        }

        button:hover,
        button:focus-visible {
            background: #2980b9;
        }

        label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 44px;
            color: white;
        }

        input[type="number"] {
            width: 64px;
            min-height: 36px;
            padding: 4px 6px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
        }

        #info {
            flex-basis: 100%;
            color: white;
            font-size: 14px;
            text-align: center;
        }

        @media (max-width: 520px) {
            #controls {
                gap: 6px;
                padding-top: 8px;
            }

            button {
                min-width: 70px;
                padding: 8px 10px;
                font-size: 14px;
            }

            label {
                flex-basis: 100%;
                justify-content: center;
            }
        }

        @media (orientation: landscape) {
            #app {
                flex-direction: row;
            }

            #viewport {
                width: auto;
                height: 100%;
            }

            #controls {
                width: clamp(136px, 22vw, 178px);
                height: 100%;
                flex: 0 0 clamp(136px, 22vw, 178px);
                flex-direction: column;
                flex-wrap: nowrap;
                justify-content: center;
                align-items: stretch;
                overflow-y: auto;
                padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) 10px;
                box-shadow: -4px 0 16px rgba(0, 0, 0, 0.25);
            }

            #controls button {
                width: 100%;
                min-width: 0;
            }

            #controls label {
                width: 100%;
                flex-basis: auto;
                flex-direction: column;
                justify-content: center;
                text-align: center;
                gap: 4px;
            }

            #controls input[type="number"] {
                width: 100%;
                max-width: 72px;
                align-self: center;
                text-align: center;
            }

            #info {
                flex-basis: auto;
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="viewport" aria-label="Трёхмерная сцена с кубиком"></div>

    <div id="controls">
        <button type="button" onclick="roll('up')">Вперёд</button>
        <button type="button" onclick="roll('down')">Назад</button>
        <button type="button" onclick="roll('left')">Влево</button>
        <button type="button" onclick="roll('right')">Вправо</button>
        <button type="button" onclick="restart()">Restart</button>
        <button type="button" onclick="fitCameraToGrid(true)">Камера</button>
        <label>
            Размер поля:
            <input type="number" id="gridSizeInput" value="5" min="1" max="20" inputmode="numeric">
        </label>
        <button type="button" onclick="applyGridSize()">Применить</button>
        <div id="info"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
"use strict";

const viewport = document.getElementById('viewport');
const gridSizeInput = document.getElementById('gridSizeInput');
let gridSize = parseInt(gridSizeInput.value, 10) || 5;
const cubeSize = 1;

function createNumberTexture(number) {
    const size = 256;
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#f4f6f8';
    ctx.fillRect(0, 0, size, size);

    ctx.strokeStyle = '#111827';
    ctx.lineWidth = 8;
    ctx.strokeRect(4, 4, size - 8, size - 8);

    ctx.fillStyle = '#111827';
    ctx.font = 'bold 180px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(number.toString(), size / 2, size / 2 + 8);

    const texture = new THREE.CanvasTexture(canvas);
    texture.minFilter = THREE.LinearFilter;
    texture.magFilter = THREE.LinearFilter;
    return texture;
}

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setClearColor(0x222222, 1);
viewport.appendChild(renderer.domElement);

const orbitControls = new THREE.OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.08;
orbitControls.target.set(0, 0.15, 0);

scene.add(new THREE.AmbientLight(0xffffff, 0.72));
const directional = new THREE.DirectionalLight(0xffffff, 0.82);
directional.position.set(5, 10, 7);
scene.add(directional);
const fill = new THREE.DirectionalLight(0x88bfff, 0.22);
fill.position.set(-6, 4, -5);
scene.add(fill);

let grid = new THREE.GridHelper(gridSize, gridSize, 0x888888, 0x444444);
grid.position.y = -0.01;
scene.add(grid);

function getViewportSize() {
    return {
        width: Math.max(1, viewport.clientWidth),
        height: Math.max(1, viewport.clientHeight)
    };
}

function resizeRendererToViewport() {
    const { width, height } = getViewportSize();
    if (width < 2 || height < 2) return false;
    camera.aspect = width / height;
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, width < 800 ? 1.35 : 2));
    renderer.setSize(width, height, false);
    camera.updateProjectionMatrix();
    return true;
}

function fitCameraToGrid(force = false) {
    if (!resizeRendererToViewport()) return;

    const { width, height } = getViewportSize();
    const aspect = width / height;
    const verticalFov = THREE.MathUtils.degToRad(camera.fov);
    const horizontalFov = 2 * Math.atan(Math.tan(verticalFov / 2) * aspect);
    const limitingFov = Math.min(verticalFov, horizontalFov);

    const halfBoard = gridSize / 2;
    const boundingRadius = Math.sqrt(halfBoard * halfBoard + halfBoard * halfBoard + 1.35 * 1.35);
    const distance = (boundingRadius / Math.sin(limitingFov / 2)) * 1.08;

    const target = new THREE.Vector3(0, 0.18, 0);
    const direction = new THREE.Vector3(-0.45, 0.65, 1).normalize();

    camera.position.copy(target).add(direction.multiplyScalar(distance));
    camera.near = Math.max(0.01, distance / 100);
    camera.far = Math.max(1000, distance * 4);
    orbitControls.target.copy(target);
    orbitControls.update();
    camera.lookAt(target);
    camera.updateProjectionMatrix();
}

function layoutScene({ fit = false } = {}) {
    const ok = resizeRendererToViewport();
    if (ok && fit) fitCameraToGrid(true);
}

function scheduleLayout({ fit = false } = {}) {
    requestAnimationFrame(() => layoutScene({ fit }));
    setTimeout(() => layoutScene({ fit }), 80);
    setTimeout(() => layoutScene({ fit }), 260);
}

const numberMap = [3, 4, 1, 6, 2, 5];
const materials = numberMap.map(n => new THREE.MeshPhongMaterial({
    map: createNumberTexture(n),
    color: 0xffffff,
    transparent: false,
    opacity: 1,
    shininess: 35
}));

const angle = Math.PI / 2;
const speed = 0.07;

const cube = new THREE.Mesh(
    new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize),
    materials
);

let cubeshift = (gridSize % 2 === 0) ? 0.5 : 0;
cube.position.set(cubeshift, 0.5, cubeshift);
scene.add(cube);

let isRotating = false;
const worldQuat = new THREE.Quaternion();

function roll(direction) {
    if (isRotating) return;

    const axis = new THREE.Vector3();
    const pivot = new THREE.Object3D();

    let pivotX = cube.position.x - 0.5;
    let pivotZ = cube.position.z - 0.5;

    if (direction === 'up') {
        axis.set(-1, 0, 0);
        if (Math.abs(pivotZ) > (gridSize - 1) / 2) { return; }
    }
    if (direction === 'down') {
        axis.set(1, 0, 0);
        pivotZ += 1;
        if (Math.abs(pivotZ) > (gridSize - 1) / 2) { return; }
    }
    if (direction === 'left') {
        axis.set(0, 0, 1);
        if (Math.abs(pivotX) > (gridSize - 1) / 2) { return; }
    }
    if (direction === 'right') {
        axis.set(0, 0, -1);
        pivotX += 1;
        if (Math.abs(pivotX) > (gridSize - 1) / 2) { return; }
    }

    scene.remove(cube);

    pivot.position.set(pivotX, 0, pivotZ);
    pivot.rotation.set(0, 0, 0);
    scene.add(pivot);
    pivot.add(cube);

    const dx = (direction === 'left') ? 0 : (direction === 'right') ? -1 : 0;
    const dz = (direction === 'up') ? 0 : (direction === 'down') ? -1 : 0;
    cube.position.set(0.5 + dx, 0.5, 0.5 + dz);

    isRotating = true;
    let rotated = 0;
    function animateRotation() {
        const step = Math.min(speed, angle - rotated);
        pivot.rotateOnAxis(axis, step);
        rotated += step;
        if (rotated < angle) {
            requestAnimationFrame(animateRotation);
        } else {
            cube.updateMatrixWorld(true);
            cube.getWorldQuaternion(worldQuat);

            pivot.remove(cube);
            scene.remove(pivot);

            scene.add(cube);
            cube.quaternion.copy(worldQuat);

            const dx = (direction === 'left') ? -1 : (direction === 'right') ? 0 : 0;
            const dz = (direction === 'up') ? -1 : (direction === 'down') ? 0 : 0;
            cube.position.set(pivotX + 0.5 + dx, 0.5, pivotZ + 0.5 + dz);

            isRotating = false;
        }
    }
    animateRotation();
}

function animate() {
    requestAnimationFrame(animate);
    orbitControls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('keydown', (event) => {
    if (event.target instanceof HTMLInputElement) return;

    const directions = {
        ArrowUp: 'up',
        ArrowDown: 'down',
        ArrowLeft: 'left',
        ArrowRight: 'right'
    };
    const direction = directions[event.key];
    if (direction) {
        event.preventDefault();
        roll(direction);
    }
});

function restart() {
    if (isRotating) return;

    cubeshift = (gridSize % 2 === 0) ? 0.5 : 0;
    cube.position.set(cubeshift, 0.5, cubeshift);
    cube.rotation.set(0, 0, 0);
    cube.quaternion.set(0, 0, 0, 1);
}

function updateGrid() {
    scene.remove(grid);
    grid = new THREE.GridHelper(gridSize, gridSize, 0x888888, 0x444444);
    grid.position.y = -0.01;
    scene.add(grid);
}

function applyGridSize() {
    const value = parseInt(gridSizeInput.value, 10);
    if (!isNaN(value) && value >= 1 && value <= 20) {
        gridSize = value;
        updateGrid();
        restart();
        scheduleLayout({ fit: true });
    }
}

if ('ResizeObserver' in window) {
    const resizeObserver = new ResizeObserver(() => scheduleLayout({ fit: false }));
    resizeObserver.observe(viewport);
}

window.addEventListener('resize', () => scheduleLayout({ fit: false }));
window.addEventListener('orientationchange', () => scheduleLayout({ fit: true }));
window.addEventListener('pageshow', () => scheduleLayout({ fit: true }));
document.addEventListener('visibilitychange', () => {
    if (!document.hidden) scheduleLayout({ fit: true });
});

scheduleLayout({ fit: true });

</script>

</body>
</html>
