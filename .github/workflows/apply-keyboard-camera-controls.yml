name: Apply keyboard camera controls

on:
  push:
    branches:
      - feature/keyboard-camera-controls
    paths:
      - tools/patch_keyboard_camera_controls.py
      - .github/workflows/apply-keyboard-camera-controls.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/keyboard-camera-controls

      - name: Apply patch
        run: python tools/patch_keyboard_camera_controls.py

      - name: Validate generated HTML
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('cube4d2.html').read_text(encoding='utf-8')
          assert text.count('function orbitCameraByKeyboard') == 1
          assert text.count('function zoomCameraByKeyboard') == 1
          assert 'e.ctrlKey' in text
          print('Keyboard camera controls are present.')
          PY
          python - <<'PY'
          from pathlib import Path
          text = Path('cube4d2.html').read_text(encoding='utf-8')
          start = text.rfind('<script>') + len('<script>')
          end = text.rfind('</script>')
          Path('/tmp/cube4d2-inline.js').write_text(text[start:end], encoding='utf-8')
          PY
          node --check /tmp/cube4d2-inline.js

      - name: Commit patched HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cube4d2.html
          git diff --cached --quiet || git commit -m "Add keyboard camera controls"
          git push
