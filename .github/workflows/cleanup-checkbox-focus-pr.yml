name: Cleanup checkbox focus PR

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'fix/checkbox-keyboard-focus'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/checkbox-keyboard-focus
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove generated test dependencies
        run: |
          rm -rf node_modules
          rm -f package.json package-lock.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Remove generated browser-test dependencies"
          git push origin HEAD:fix/checkbox-keyboard-focus
