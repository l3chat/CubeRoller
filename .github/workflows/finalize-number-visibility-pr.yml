name: Finalize number visibility PR

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'feature/number-visibility-controls'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/number-visibility-controls
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build standalone HTML
        run: |
          cp cube4d2-base.html cube4d2.html
          python tools/patch_number_visibility_controls.py
          rm -f cube4d2-base.html
          rm -f tools/patch_number_visibility_controls.py
          rm -f .github/workflows/apply-number-visibility-controls.yml

      - name: Validate
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('cube4d2.html').read_text(encoding='utf-8')
          assert text.count('data-number-limit=') == 8
          assert 'function setNumberVisibilityLimit(limit)' in text
          assert '/^[0-7]$/.test(e.key)' in text
          assert 'cube4d2-base.html' not in text
          start = text.rfind('<script>') + len('<script>')
          end = text.rfind('</script>')
          Path('/tmp/cube4d2-inline.js').write_text(text[start:end], encoding='utf-8')
          PY
          node --check /tmp/cube4d2-inline.js

      - name: Commit standalone result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Finalize standalone number visibility controls"
          git push origin HEAD:feature/number-visibility-controls
