name: Apply flat face size

on:
  push:
    branches:
      - feature/flat-face-size
    paths:
      - tools/patch_flat_face_size.py
      - .github/workflows/apply-flat-face-size.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/flat-face-size

      - name: Apply patch
        run: python tools/patch_flat_face_size.py

      - name: Validate generated HTML
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('cube4d2.html').read_text(encoding='utf-8')
          assert text.count('new THREE.PlaneGeometry(0.85,0.85)') == 1
          print('Flat-face size is 85% of the original side length.')
          PY
          python - <<'PY'
          from pathlib import Path
          text = Path('cube4d2.html').read_text(encoding='utf-8')
          start = text.rfind('<script>') + len('<script>')
          end = text.rfind('</script>')
          Path('/tmp/cube4d2-inline.js').write_text(text[start:end], encoding='utf-8')
          PY
          node --check /tmp/cube4d2-inline.js

      - name: Commit patched HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cube4d2.html
          git diff --cached --quiet || git commit -m "Reduce flat face square size by 15 percent"
          git push
