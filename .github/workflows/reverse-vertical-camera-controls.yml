name: Reverse vertical camera controls

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.head_ref == 'fix/reverse-vertical-camera-controls'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/reverse-vertical-camera-controls
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply patch
        run: python tools/reverse_vertical_camera_controls.py

      - name: Validate JavaScript and directions
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('cube4d2.html').read_text(encoding='utf-8')
          assert 'else if(e.key === "ArrowUp") orbitCameraByKeyboard(0, cameraOrbitStep);' in text
          assert 'else if(e.key === "ArrowDown") orbitCameraByKeyboard(0, -cameraOrbitStep);' in text
          start = text.rfind('<script>') + len('<script>')
          end = text.rfind('</script>')
          Path('/tmp/cube4d2-inline.js').write_text(text[start:end], encoding='utf-8')
          PY
          node --check /tmp/cube4d2-inline.js

      - name: Commit result
        run: |
          rm -f tools/reverse_vertical_camera_controls.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cube4d2.html tools/reverse_vertical_camera_controls.py
          git diff --cached --quiet || git commit -m "Reverse vertical keyboard camera controls"
          git push origin HEAD:fix/reverse-vertical-camera-controls
