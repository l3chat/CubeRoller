name: Verify cell 7 initial orientation

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  verify:
    if: github.head_ref == 'fix/initial-cell7-orientation'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/initial-cell7-orientation
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply fix
        run: python tools/fix_initial_cell7_orientation.py

      - name: Validate JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('cube4d2.html').read_text(encoding='utf-8')
          assert 'orientations[7] = {x:1,y:0,z:0,w:0};' in text
          assert 'pendingNormals[7] = {x:0,y:0,z:1};' in text
          start = text.rfind('<script>') + len('<script>')
          end = text.rfind('</script>')
          Path('/tmp/cube4d2-inline.js').write_text(text[start:end], encoding='utf-8')
          PY
          node --check /tmp/cube4d2-inline.js

      - name: Install Playwright Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Start local server
        run: python3 -m http.server 8000 --bind 127.0.0.1 > /tmp/cuberoller-http.log 2>&1 &

      - name: Verify closed cycles preserve cell 7 orientation
        run: |
          cat > verify.js <<'JS'
          const { chromium } = require('playwright');
          const assert = require('node:assert/strict');

          const equivalentQuaternion = (a, b, eps = 1e-6) => {
            const direct = Math.hypot(a.x-b.x, a.y-b.y, a.z-b.z, a.w-b.w);
            const negated = Math.hypot(a.x+b.x, a.y+b.y, a.z+b.z, a.w+b.w);
            return Math.min(direct, negated) < eps;
          };

          (async () => {
            const browser = await chromium.launch({ headless: true, args: ['--use-gl=swiftshader'] });
            const page = await browser.newPage({ viewport: { width: 1280, height: 800 } });
            await page.goto('http://127.0.0.1:8000/cube4d2.html', { waitUntil: 'networkidle' });
            await page.waitForSelector('canvas');

            const snapshot = () => page.evaluate(() => ({
              q: {...state.orientations[7]},
              pending: state.pendingNormals[7] ? {...state.pendingNormals[7]} : null,
              active: state.active,
              axes: JSON.parse(JSON.stringify(state.axes)),
              field: {...state.field}
            }));
            const move = async (axis, sign) => {
              await page.evaluate(([axis, sign]) => runMove(axis, sign), [axis, sign]);
              await page.waitForFunction(() => !busy, null, { timeout: 10000 });
            };
            const cycle = async () => {
              await move(1, 1);
              await move(1, -1);
              await move(2, 1);
              await move(2, -1);
            };

            const initial = await snapshot();
            await cycle();
            const afterFirst = await snapshot();
            await cycle();
            const afterSecond = await snapshot();

            assert.ok(equivalentQuaternion(initial.q, afterFirst.q), 'first cycle must preserve cell 7 orientation');
            assert.ok(equivalentQuaternion(initial.q, afterSecond.q), 'second cycle must preserve cell 7 orientation');
            assert.deepEqual(afterFirst.pending, initial.pending, 'first cycle must preserve cell 7 pending normal');
            assert.deepEqual(afterSecond.pending, initial.pending, 'second cycle must preserve cell 7 pending normal');
            assert.equal(afterFirst.active, initial.active);
            assert.deepEqual(afterFirst.axes, initial.axes);
            assert.deepEqual(afterFirst.field, initial.field);
            assert.equal(afterSecond.active, initial.active);
            assert.deepEqual(afterSecond.axes, initial.axes);
            assert.deepEqual(afterSecond.field, initial.field);

            await browser.close();
            console.log('Cell 7 orientation remains invariant across repeated U-D-F-B cycles.');
          })().catch(error => { console.error(error); process.exit(1); });
          JS
          node verify.js

      - name: Commit verified fix
        run: |
          rm -rf node_modules package.json package-lock.json verify.js tools/fix_initial_cell7_orientation.py .diagnose-cell7-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Fix initial orientation of external cell 7"
          git push origin HEAD:fix/initial-cell7-orientation
