name: Verify cell 7 initial orientation

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  verify:
    if: github.head_ref == 'fix/initial-cell7-orientation'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/initial-cell7-orientation
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply fix
        run: python tools/fix_initial_cell7_orientation.py

      - name: Validate JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('cube4d2.html').read_text(encoding='utf-8')
          assert 'orientations[7] = {x:1,y:0,z:0,w:0};' in text
          assert 'pendingNormals[7] = {x:0,y:0,z:1};' in text
          start = text.rfind('<script>') + len('<script>')
          end = text.rfind('</script>')
          Path('/tmp/cube4d2-inline.js').write_text(text[start:end], encoding='utf-8')
          PY
          node --check /tmp/cube4d2-inline.js

      - name: Install Playwright Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Start local server
        run: python3 -m http.server 8000 --bind 127.0.0.1 > /tmp/cuberoller-http.log 2>&1 &

      - name: Capture repeated-cycle states
        run: |
          cat > verify.js <<'JS'
          const { chromium } = require('playwright');
          const fs = require('node:fs');

          (async () => {
            const browser = await chromium.launch({ headless: true, args: ['--use-gl=swiftshader'] });
            const page = await browser.newPage({ viewport: { width: 1280, height: 800 } });
            await page.goto('http://127.0.0.1:8000/cube4d2.html', { waitUntil: 'networkidle' });
            await page.waitForSelector('canvas');

            const snapshot = label => page.evaluate(label => ({
              label,
              q: {...state.orientations[7]},
              renderedQ: quatToObj(cells.get(7).quaternion.clone()),
              pending: state.pendingNormals[7] ? {...state.pendingNormals[7]} : null,
              externalPosition: state.externalPositions[7] ? {...state.externalPositions[7]} : null,
              active: state.active,
              axes: JSON.parse(JSON.stringify(state.axes)),
              field: {...state.field}
            }), label);
            const move = async (axis, sign) => {
              await page.evaluate(([axis, sign]) => runMove(axis, sign), [axis, sign]);
              await page.waitForFunction(() => !busy, null, { timeout: 10000 });
            };
            const cycle = async () => {
              await move(1, 1);
              await move(1, -1);
              await move(2, 1);
              await move(2, -1);
            };

            const data = [await snapshot('initial')];
            await cycle();
            data.push(await snapshot('after-first'));
            await cycle();
            data.push(await snapshot('after-second'));
            fs.writeFileSync('cell7-fixed-state.json', JSON.stringify(data, null, 2));
            console.log(JSON.stringify(data, null, 2));
            await browser.close();
          })().catch(error => { console.error(error); process.exit(1); });
          JS
          node verify.js

      - name: Upload state snapshots
        uses: actions/upload-artifact@v4
        with:
          name: cell7-fixed-state
          path: cell7-fixed-state.json

      - name: Commit candidate fix
        run: |
          rm -rf node_modules package.json package-lock.json verify.js cell7-fixed-state.json tools/fix_initial_cell7_orientation.py .diagnose-cell7-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Fix initial orientation of external cell 7"
          git push origin HEAD:fix/initial-cell7-orientation
