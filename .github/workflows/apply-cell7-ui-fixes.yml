name: Apply cell 7 and UI fixes

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.head_ref == 'fix/cell7-camera-ui-toggle-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/cell7-camera-ui-toggle-v2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply patch
        run: python tools/apply_cell7_ui_fixes.py

      - name: Validate JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('cube4d2.html').read_text(encoding='utf-8')
          assert 'orientations[7] = {x:1,y:0,z:0,w:0};' not in text
          assert 'body.ui-hidden #panel{visibility:hidden' in text
          assert 'requestAnimationFrame(layoutScene)' not in text
          start = text.rfind('<script>') + len('<script>')
          end = text.rfind('</script>')
          Path('/tmp/cube4d2-inline.js').write_text(text[start:end], encoding='utf-8')
          PY
          node --check /tmp/cube4d2-inline.js

      - name: Install Playwright Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Start local server
        run: python3 -m http.server 8000 --bind 127.0.0.1 > /tmp/cuberoller-http.log 2>&1 &

      - name: Verify UI toggle and cell 7
        run: |
          cat > verify.js <<'JS'
          const { chromium } = require('playwright');
          const assert = require('node:assert/strict');

          const nearly = (a,b,eps=1.5) => Math.abs(a-b) <= eps;
          const sameQ = (a,b,eps=1e-5) => Math.min(
            Math.hypot(a.x-b.x,a.y-b.y,a.z-b.z,a.w-b.w),
            Math.hypot(a.x+b.x,a.y+b.y,a.z+b.z,a.w+b.w)
          ) < eps;

          (async()=>{
            const browser = await chromium.launch({headless:true,args:['--use-gl=swiftshader']});
            const page = await browser.newPage({viewport:{width:412,height:915},deviceScaleFactor:2});
            const errors=[];
            page.on('pageerror',e=>errors.push(String(e)));
            await page.goto('http://127.0.0.1:8000/cube4d2.html',{waitUntil:'networkidle'});
            await page.waitForSelector('#panel');

            const buttonMetrics = () => page.evaluate(() => [...document.querySelectorAll('#panel button')].map(b=>{
              const r=b.getBoundingClientRect();
              const s=getComputedStyle(b);
              return {id:b.id||b.dataset.numberLimit||'',w:r.width,h:r.height,font:s.fontSize,display:s.display,visibility:s.visibility};
            }));
            const cameraPosition = () => page.evaluate(() => camera.position.toArray());

            const before = await buttonMetrics();
            const cameraBefore = await cameraPosition();
            await page.locator('#uiToggle').click();
            await page.waitForTimeout(100);
            assert.equal(await page.evaluate(()=>document.body.classList.contains('ui-hidden')),true);
            await page.locator('#uiToggle').click();
            await page.waitForTimeout(150);
            assert.equal(await page.evaluate(()=>document.body.classList.contains('ui-hidden')),false);
            const after = await buttonMetrics();
            const cameraAfter = await cameraPosition();

            assert.equal(after.length,before.length);
            for(let i=0;i<before.length;i++){
              assert.equal(after[i].display,before[i].display,`display changed for ${before[i].id}`);
              assert.equal(after[i].visibility,before[i].visibility,`visibility changed for ${before[i].id}`);
              assert.equal(after[i].font,before[i].font,`font changed for ${before[i].id}`);
              assert.ok(nearly(after[i].w,before[i].w),`width changed for ${before[i].id}: ${before[i].w} -> ${after[i].w}`);
              assert.ok(nearly(after[i].h,before[i].h),`height changed for ${before[i].id}: ${before[i].h} -> ${after[i].h}`);
            }
            for(let i=0;i<3;i++) assert.ok(Math.abs(cameraAfter[i]-cameraBefore[i])<1e-6,'UI toggle reset camera');

            const initial = await page.evaluate(()=>({q:{...state.orientations[7]},pending:{...state.pendingNormals[7]}}));
            assert.ok(sameQ(initial.q,{x:0,y:0,z:0,w:1}),'cell 7 must start with identity orientation');

            const move=async(a,s)=>{await page.evaluate(([a,s])=>runMove(a,s),[a,s]);await page.waitForFunction(()=>!busy,null,{timeout:10000});};
            const cycle=async()=>{await move(1,1);await move(1,-1);await move(2,1);await move(2,-1);};
            await cycle();
            const first=await page.evaluate(()=>({q:{...state.orientations[7]},pending:{...state.pendingNormals[7]}}));
            await cycle();
            const second=await page.evaluate(()=>({q:{...state.orientations[7]},pending:{...state.pendingNormals[7]}}));
            assert.ok(sameQ(initial.q,first.q),'first U-D-F-B cycle changed cell 7 orientation');
            assert.ok(sameQ(initial.q,second.q),'second U-D-F-B cycle changed cell 7 orientation');
            assert.deepEqual(first.pending,initial.pending);
            assert.deepEqual(second.pending,initial.pending);
            assert.deepEqual(errors,[]);

            await page.screenshot({path:'cell7-ui-toggle.png',fullPage:true});
            await browser.close();
            console.log('UI toggle and cell 7 tests passed.');
          })().catch(e=>{console.error(e);process.exit(1)});
          JS
          node verify.js

      - name: Commit verified result
        run: |
          rm -rf node_modules package.json package-lock.json verify.js tools/apply_cell7_ui_fixes.py .cell7-ui-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Fix initial cell 7 orientation and UI toggle rendering"
          git push origin HEAD:fix/cell7-camera-ui-toggle-v2
