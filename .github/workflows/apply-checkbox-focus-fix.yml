name: Apply checkbox focus fix

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.head_ref == 'fix/checkbox-keyboard-focus'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/checkbox-keyboard-focus
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply patch
        run: python tools/fix_checkbox_keyboard_focus.py

      - name: Validate JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('cube4d2.html').read_text(encoding='utf-8')
          assert 'e.target.blur();' in text
          assert 'const nonEditingTypes = new Set' in text
          start = text.rfind('<script>') + len('<script>')
          end = text.rfind('</script>')
          Path('/tmp/cube4d2-inline.js').write_text(text[start:end], encoding='utf-8')
          PY
          node --check /tmp/cube4d2-inline.js

      - name: Install Playwright Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Start local server
        run: python3 -m http.server 8000 --bind 127.0.0.1 > /tmp/cuberoller-http.log 2>&1 &

      - name: Run focus interaction test
        run: |
          cat > browser-test.js <<'JS'
          const { chromium } = require('playwright');
          const assert = require('node:assert/strict');

          (async () => {
            const browser = await chromium.launch({ headless: true, args: ['--use-gl=swiftshader'] });
            const page = await browser.newPage({ viewport: { width: 1280, height: 800 } });
            await page.goto('http://127.0.0.1:8000/cube4d2.html', { waitUntil: 'networkidle' });
            await page.waitForSelector('canvas');

            const activeLimit = async () => Number(await page.locator('button[data-number-limit].active').getAttribute('data-number-limit'));

            await page.locator('#trailCheckbox').click();
            assert.notEqual(await page.evaluate(() => document.activeElement?.id), 'trailCheckbox');
            await page.keyboard.press('3');
            assert.equal(await activeLimit(), 3, 'number shortcut after trail toggle');

            await page.locator('#trailCheckbox').click();
            await page.keyboard.press('5');
            assert.equal(await activeLimit(), 5, 'number shortcut after trail reset');

            await page.locator('#flatViewCheckbox').click();
            assert.notEqual(await page.evaluate(() => document.activeElement?.id), 'flatViewCheckbox');
            await page.keyboard.press('2');
            assert.equal(await activeLimit(), 2, 'number shortcut after flat-view toggle');

            await page.locator('#flatViewCheckbox').click();
            await page.keyboard.press('6');
            assert.equal(await activeLimit(), 6, 'number shortcut after flat-view reset');

            await page.locator('#resetBtn').click();
            const before = await page.locator('#info').textContent();
            await page.keyboard.press('ArrowLeft');
            await page.waitForFunction(value => document.querySelector('#info').textContent !== value, before, { timeout: 5000 });

            await page.locator('#fieldSizeInput').focus();
            const protectedInfo = await page.locator('#info').textContent();
            await page.keyboard.press('ArrowUp');
            assert.equal(await page.locator('#info').textContent(), protectedInfo, 'number input still blocks global movement');

            await browser.close();
            console.log('Checkbox and reset focus tests passed.');
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          JS
          node browser-test.js

      - name: Commit result
        run: |
          rm -f tools/fix_checkbox_keyboard_focus.py browser-test.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Restore keyboard control after UI toggles"
          git push origin HEAD:fix/checkbox-keyboard-focus
