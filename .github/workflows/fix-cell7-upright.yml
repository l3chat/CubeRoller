name: Fix cell 7 upright orientation

# Registered separately so GitHub Actions recognizes this workflow on pull_request_target.
on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.event.pull_request.head.ref == 'fix/cell7-upright'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/cell7-upright
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply patch
        run: python tools/fix_cell7_upright.py

      - name: Validate JavaScript and initial orientation
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('cube4d2.html').read_text(encoding='utf-8')
          assert 'orientations[7] = {x:0,y:1,z:0,w:0};' in text
          start = text.rfind('<script>') + len('<script>')
          end = text.rfind('</script>')
          Path('/tmp/cube4d2-inline.js').write_text(text[start:end], encoding='utf-8')
          PY
          node --check /tmp/cube4d2-inline.js

      - name: Install Playwright Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Start local server
        run: python3 -m http.server 8000 --bind 127.0.0.1 > /tmp/cuberoller-http.log 2>&1 &

      - name: Verify upright and stable orientation
        run: |
          cat > verify.js <<'JS'
          const { chromium } = require('playwright');
          const assert = require('node:assert/strict');

          const sameQ = (a,b,eps=1e-5) => Math.min(
            Math.hypot(a.x-b.x,a.y-b.y,a.z-b.z,a.w-b.w),
            Math.hypot(a.x+b.x,a.y+b.y,a.z+b.z,a.w+b.w)
          ) < eps;

          (async()=>{
            const browser = await chromium.launch({headless:true,args:['--use-gl=swiftshader']});
            const page = await browser.newPage({viewport:{width:1280,height:800}});
            await page.goto('http://127.0.0.1:8000/cube4d2.html',{waitUntil:'networkidle'});
            await page.waitForSelector('canvas');

            const initial = await page.evaluate(() => {
              const q = cells.get(7).quaternion.clone();
              const localUp = new THREE.Vector3(0,1,0).applyQuaternion(q);
              const localBack = new THREE.Vector3(0,0,-1).applyQuaternion(q);
              return {
                q:{...state.orientations[7]},
                pending:state.pendingNormals[7] ? {...state.pendingNormals[7]} : null,
                localUp:{x:localUp.x,y:localUp.y,z:localUp.z},
                localBack:{x:localBack.x,y:localBack.y,z:localBack.z}
              };
            });

            assert.ok(initial.localUp.y > 0.999, 'cell 7 local up must point world-up');
            assert.ok(initial.localBack.z > 0.999, 'cell 7 numbered back face must point toward the camera side');

            const move = async(a,s) => {
              await page.evaluate(([a,s]) => runMove(a,s), [a,s]);
              await page.waitForFunction(() => !busy, null, {timeout:10000});
            };
            const cycle = async()=>{
              await move(1,1); await move(1,-1); await move(2,1); await move(2,-1);
            };

            await cycle();
            const afterFirst = await page.evaluate(() => ({q:{...state.orientations[7]},pending:{...state.pendingNormals[7]}}));
            await cycle();
            const afterSecond = await page.evaluate(() => ({q:{...state.orientations[7]},pending:{...state.pendingNormals[7]}}));

            assert.ok(sameQ(initial.q, afterFirst.q), 'first cycle changed cell 7 orientation');
            assert.ok(sameQ(initial.q, afterSecond.q), 'second cycle changed cell 7 orientation');
            assert.deepEqual(afterFirst.pending, initial.pending);
            assert.deepEqual(afterSecond.pending, initial.pending);

            await page.screenshot({path:'cell7-upright.png',fullPage:true});
            await browser.close();
            console.log('Cell 7 is upright and stable across repeated U-D-F-B cycles.');
          })().catch(e=>{console.error(e);process.exit(1)});
          JS
          node verify.js

      - name: Commit verified fix
        run: |
          rm -rf node_modules package.json package-lock.json verify.js tools/fix_cell7_upright.py .cell7-upright-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Turn initial cell 7 upright"
          git push origin HEAD:fix/cell7-upright
