name: Fix cell 7 initial facing

on:
  push:
    branches: [fix/cell7-upright]

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/cell7-upright
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply patch
        run: python tools/fix_cell7_upright.py
      - name: Validate JavaScript and initial orientation
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('cube4d2.html').read_text(encoding='utf-8')
          assert 'orientations[7] = {x:0,y:0,z:0,w:1};' in text
          assert 'pendingNormals[7] = {x:0,y:0,z:1};' in text
          start = text.rfind('<script>') + len('<script>')
          end = text.rfind('</script>')
          Path('/tmp/cube4d2-inline.js').write_text(text[start:end], encoding='utf-8')
          PY
          node --check /tmp/cube4d2-inline.js
      - name: Install Playwright Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Start local server
        run: python3 -m http.server 8000 --bind 127.0.0.1 > /tmp/cuberoller-http.log 2>&1 &
      - name: Verify common facing and stable cycles
        run: |
          cat > verify.js <<'JS'
          const { chromium } = require('playwright');
          const assert = require('node:assert/strict');
          const sameQ=(a,b,eps=1e-5)=>Math.min(Math.hypot(a.x-b.x,a.y-b.y,a.z-b.z,a.w-b.w),Math.hypot(a.x+b.x,a.y+b.y,a.z+b.z,a.w+b.w))<eps;
          (async()=>{
            const browser=await chromium.launch({headless:true,args:['--use-gl=swiftshader']});
            const page=await browser.newPage({viewport:{width:1280,height:800}});
            await page.goto('http://127.0.0.1:8000/cube4d2.html',{waitUntil:'networkidle'});
            await page.waitForSelector('canvas');
            const initial=await page.evaluate(()=>{
              const q=cells.get(7).quaternion.clone();
              const up=new THREE.Vector3(0,1,0).applyQuaternion(q);
              const front=new THREE.Vector3(0,0,1).applyQuaternion(q);
              return {q:{...state.orientations[7]},pending:{...state.pendingNormals[7]},up:{x:up.x,y:up.y,z:up.z},front:{x:front.x,y:front.y,z:front.z}};
            });
            assert.ok(initial.up.y>0.999,'cell 7 top must point upward');
            assert.ok(initial.front.z>0.999,'cell 7 front must match the other cells');
            const move=async(a,s)=>{await page.evaluate(([a,s])=>runMove(a,s),[a,s]);await page.waitForFunction(()=>!busy,null,{timeout:10000});};
            const cycle=async()=>{await move(1,1);await move(1,-1);await move(2,1);await move(2,-1);};
            await cycle(); const first=await page.evaluate(()=>({q:{...state.orientations[7]},pending:{...state.pendingNormals[7]}}));
            await cycle(); const second=await page.evaluate(()=>({q:{...state.orientations[7]},pending:{...state.pendingNormals[7]}}));
            assert.ok(sameQ(initial.q,first.q),'first cycle changed cell 7 orientation');
            assert.ok(sameQ(initial.q,second.q),'second cycle changed cell 7 orientation');
            assert.deepEqual(first.pending,initial.pending);
            assert.deepEqual(second.pending,initial.pending);
            await browser.close();
            console.log('Cell 7 matches the common initial facing and remains stable.');
          })().catch(e=>{console.error(e);process.exit(1)});
          JS
          node verify.js
      - name: Commit verified fix
        run: |
          rm -rf node_modules package.json package-lock.json verify.js tools/fix_cell7_upright.py .cell7-upright-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Make initial cell 7 face the camera"
          git push origin HEAD:fix/cell7-upright
