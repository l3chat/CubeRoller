name: Apply flat face view patch

on:
  push:
    branches:
      - feature/flat-face-view
    paths:
      - tools/patch_flat_face_transparency.py
      - .github/workflows/apply-flat-face-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/flat-face-view

      - name: Apply transparency patch
        run: python tools/patch_flat_face_transparency.py

      - name: Validate generated HTML
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('cube4d2.html').read_text(encoding='utf-8')
          assert 'const flatFaceOpacity = 0.65;' in text
          assert 'flatFace.material.opacity = opacity * flatFaceOpacity;' in text
          assert 'opacity: flatFaceOpacity' in text
          print('Transparency markers validated.')
          PY
          python - <<'PY'
          from pathlib import Path
          text = Path('cube4d2.html').read_text(encoding='utf-8')
          start = text.rfind('<script>') + len('<script>')
          end = text.rfind('</script>')
          Path('/tmp/cube4d2-inline.js').write_text(text[start:end], encoding='utf-8')
          PY
          node --check /tmp/cube4d2-inline.js

      - name: Commit patched HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cube4d2.html
          git diff --cached --quiet || git commit -m "Make flat face view translucent"
          git push
