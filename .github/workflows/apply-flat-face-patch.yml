name: Apply flat face view patch

on:
  pull_request:
    branches:
      - main
    paths:
      - tools/patch_flat_face_view.py
      - .github/workflows/apply-flat-face-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/flat-face-view

      - name: Apply patch
        run: python tools/patch_flat_face_view.py

      - name: Validate generated HTML
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('cube4d2.html').read_text(encoding='utf-8')
          assert text.count('id="flatViewCheckbox"') == 1
          assert text.count('flatFace.name = "flatFace"') == 1
          assert text.count('function applyCellRenderMode(group)') == 1
          assert text.count('function applyRenderMode()') == 1
          print('Flat-face view markers are present exactly once.')
          PY
          python - <<'PY'
          from pathlib import Path
          text = Path('cube4d2.html').read_text(encoding='utf-8')
          start = text.rfind('<script>') + len('<script>')
          end = text.rfind('</script>')
          Path('/tmp/cube4d2-inline.js').write_text(text[start:end], encoding='utf-8')
          PY
          node --check /tmp/cube4d2-inline.js

      - name: Commit patched HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cube4d2.html
          git diff --cached --quiet || git commit -m "Add switchable flat face view"
          git push origin HEAD:feature/flat-face-view
