name: Fix keyboard input guard

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/keyboard-input-guard'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/keyboard-input-guard
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply fix
        run: python tools/fix_keyboard_input_guard.py

      - name: Validate
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('cube4d2.html').read_text(encoding='utf-8')
          assert 'function isKeyboardInputTarget(target)' in text
          assert '/^(?:Digit|Numpad)([0-7])$/' in text
          assert 'if(isKeyboardInputTarget(e.target)) return;' in text
          start = text.rfind('<script>') + len('<script>')
          end = text.rfind('</script>')
          Path('/tmp/cube4d2-inline.js').write_text(text[start:end], encoding='utf-8')
          PY
          node --check /tmp/cube4d2-inline.js

      - name: Commit result
        run: |
          rm -f tools/fix_keyboard_input_guard.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Fix keyboard shortcuts around focused controls"
          git push origin HEAD:fix/keyboard-input-guard
