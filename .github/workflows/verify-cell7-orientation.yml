name: Verify cell 7 orientation invariant

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  verify:
    if: github.event.pull_request.head.ref == 'fix/initial-cell7-orientation'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/initial-cell7-orientation
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Validate JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('cube4d2.html').read_text(encoding='utf-8')
          start = text.rfind('<script>') + len('<script>')
          end = text.rfind('</script>')
          Path('/tmp/cube4d2-inline.js').write_text(text[start:end], encoding='utf-8')
          PY
          node --check /tmp/cube4d2-inline.js
      - name: Install Playwright Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Start local server
        run: python3 -m http.server 8000 --bind 127.0.0.1 > /tmp/cuberoller-http.log 2>&1 &
      - name: Verify repeated closed cycles
        run: |
          cat > verify.js <<'JS'
          const { chromium } = require('playwright');
          const assert = require('node:assert/strict');
          const sameQ=(a,b,eps=1e-5)=>Math.min(Math.hypot(a.x-b.x,a.y-b.y,a.z-b.z,a.w-b.w),Math.hypot(a.x+b.x,a.y+b.y,a.z+b.z,a.w+b.w))<eps;
          (async()=>{
            const browser=await chromium.launch({headless:true,args:['--use-gl=swiftshader']});
            const page=await browser.newPage({viewport:{width:1280,height:800}});
            await page.goto('http://127.0.0.1:8000/cube4d2.html',{waitUntil:'networkidle'});
            await page.waitForSelector('canvas');
            const snap=()=>page.evaluate(()=>({q:{...state.orientations[7]},pending:state.pendingNormals[7]?{...state.pendingNormals[7]}:null,active:state.active,axes:JSON.parse(JSON.stringify(state.axes)),field:{...state.field}}));
            const move=async(a,s)=>{await page.evaluate(([a,s])=>runMove(a,s),[a,s]);await page.waitForFunction(()=>!busy,null,{timeout:10000});};
            const cycle=async()=>{await move(1,1);await move(1,-1);await move(2,1);await move(2,-1);};
            const initial=await snap(); await cycle(); const first=await snap(); await cycle(); const second=await snap();
            console.log('INITIAL',JSON.stringify(initial)); console.log('FIRST',JSON.stringify(first)); console.log('SECOND',JSON.stringify(second));
            assert.ok(sameQ(initial.q,first.q),'first cycle changed cell 7 orientation');
            assert.ok(sameQ(initial.q,second.q),'second cycle changed cell 7 orientation');
            assert.deepEqual(first.pending,initial.pending);
            assert.deepEqual(second.pending,initial.pending);
            assert.equal(first.active,initial.active); assert.deepEqual(first.axes,initial.axes); assert.deepEqual(first.field,initial.field);
            assert.equal(second.active,initial.active); assert.deepEqual(second.axes,initial.axes); assert.deepEqual(second.field,initial.field);
            await browser.close(); console.log('PASS');
          })().catch(e=>{console.error(e);process.exit(1)});
          JS
          node verify.js
      - name: Remove trigger file
        run: |
          rm -rf node_modules package.json package-lock.json verify.js .verify-cell7-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Remove cell 7 verification trigger"
          git push origin HEAD:fix/initial-cell7-orientation
