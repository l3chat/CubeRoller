<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>4D cube roller v8k — fog control and wall projections</title>
<style>
:root{--bg0:#0d1117;--bg1:#172033;--panel:rgba(8,12,20,.91);--text:#eaf3ff;--muted:#abc2dc;--accent:#4da6ff;--gold:#ffd166}
*{box-sizing:border-box}
body{margin:0;overflow:hidden;background:radial-gradient(circle at 18% 16%,#263a60 0%,transparent 42%),radial-gradient(circle at 84% 78%,#1d304d 0%,transparent 45%),linear-gradient(140deg,var(--bg0),var(--bg1));color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#panel{position:absolute;top:12px;right:12px;z-index:5;width:min(500px,calc(100vw - 24px));padding:12px;border-radius:12px;background:var(--panel);border:1px solid rgba(125,190,255,.25);box-shadow:0 12px 32px rgba(0,0,0,.35);display:grid;gap:10px;backdrop-filter:blur(8px)}
h1{margin:0;font-size:16px;line-height:1.25}
.hint,#info{font-size:12px;line-height:1.4;color:#cfe4ff;white-space:pre-line}
.row{display:flex;gap:6px}
button{flex:1;min-height:36px;border:0;border-radius:8px;background:var(--accent);color:white;font-weight:700;cursor:pointer;font-size:13px}
button.secondary{background:#334155}
button.gold{background:#b7791f}
button.green{background:#14815f}
button:disabled{opacity:.45;cursor:not-allowed}
label{display:flex;align-items:center;justify-content:space-between;gap:8px;color:#cfe4ff;font-size:12px}
input[type=number]{width:72px}
#info{font-size:12px;line-height:1.35;color:#cfe4ff;white-space:pre-line}
@media(max-width:800px){#panel{left:8px;right:8px;top:auto;bottom:8px;width:auto;max-height:64vh;overflow:auto}}
</style>
</head>
<body>
<div id="panel">
<div class="row"><button data-axis="0" data-sign="-1" id="btnLeft">ВЛЕВО</button><button data-axis="0" data-sign="1" id="btnRight">ВПРАВО</button></div>
<div class="row"><button data-axis="1" data-sign="1" id="btnUp">ВВЕРХ</button><button data-axis="1" data-sign="-1" id="btnDown">ВНИЗ</button></div>
<div class="row"><button data-axis="2" data-sign="1" id="btnForward">ВПЕРЁД</button><button data-axis="2" data-sign="-1" id="btnBack">НАЗАД</button></div>
<div class="row"><button id="undoBtn" class="green">Назад</button><button id="resetBtn" class="secondary">Сброс</button></div>
<div class="row"><button id="toggleFieldBtn" class="secondary">Поле</button></div>
<label><span>Путь</span><input id="trailCheckbox" type="checkbox" checked></label>
<label><span>Туман</span><input id="fogStrengthInput" type="range" min="0" max="100" step="1" value="60"></label>
<label><span>Поле</span><input id="fieldSizeInput" type="number" min="3" max="9" step="2" value="5"></label>
<div class="row"><button id="applyFieldBtn" class="gold">Применить</button></div>
<div id="info"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
"use strict";

const spacing = 1.0;
const h = 0.5;
const rollStep = 0.045;

const colors = {
  0:0xd8e1ea, 1:0xd8e1ea, 2:0xd8e1ea, 3:0xd8e1ea,
  4:0xd8e1ea, 5:0xd8e1ea, 6:0xd8e1ea, 7:0xd8e1ea
};

const allIds = [0,1,2,3,4,5,6,7];
// Противоположности по новой схеме: 0↔7, 1↔6, 2↔5, 3↔4.
const opposite = {0:7,7:0,1:6,6:1,2:5,5:2,3:4,4:3};

// Visual/world axes.
// Z-plus is "forward" into the screen. In Three.js this is negative world Z.
const dirVectors = [
  new THREE.Vector3(1,0,0),   // X right
  new THREE.Vector3(0,1,0),   // Y up
  new THREE.Vector3(0,0,-1)   // Z forward; therefore 0→2 = forward, 0→5 = back
];

const axisNames = ["X", "Y", "Z"];

let fieldSize = 5;
let fogStrength = 0.60;
let state = null;
let history = [];
let busy = false;
let edgesVisible = false;
let trailVisible = true;
let fieldVisible = true;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, .1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
renderer.setClearColor(0x111827, 1);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = .08;

scene.add(new THREE.AmbientLight(0xffffff, .72));
const light = new THREE.DirectionalLight(0xffffff, .92);
light.position.set(7,10,8);
scene.add(light);
const fill = new THREE.DirectionalLight(0x88bfff, .32);
fill.position.set(-8,5,-7);
scene.add(fill);

camera.position.set(-7.5,6.5,9.2);
controls.target.set(0,.4,0);
camera.lookAt(controls.target);

const cells = new Map();
const edgeGroup = new THREE.Group();
const trailGroup = new THREE.Group();
const fieldGroup = new THREE.Group();
const projectionGroup = new THREE.Group();
scene.add(fieldGroup);
scene.add(projectionGroup);
scene.add(trailGroup);
scene.add(edgeGroup);

function clearGroup(group){
  while(group.children.length){
    const child = group.children.pop();
    if(child.geometry) child.geometry.dispose?.();
    if(child.material){
      const mats = Array.isArray(child.material) ? child.material : [child.material];
      for(const m of mats){
        if(m.map) m.map.dispose?.();
        m.dispose?.();
      }
    }
  }
}

function cloneAxes(axes){
  return axes.map(p => ({plus:p.plus, minus:p.minus}));
}

function vecToObj(v){
  return {x:v.x, y:v.y, z:v.z};
}

function objToVec(o){
  return new THREE.Vector3(o.x, o.y, o.z);
}

function cloneState(s){
  return {
    active: s.active,
    axes: cloneAxes(s.axes),
    field: {...s.field},
    path: [...s.path],
    fieldPath: s.fieldPath.map(p => ({...p}))
  };
}

function initialState(){
  return {
    active: 0,
    axes: [
      {plus:3, minus:4}, // right / left
      {plus:1, minus:6}, // up / down
      {plus:2, minus:5}  // forward / back
    ],
    field: {x:0, y:0, z:0},
    path: [0],
    fieldPath: [{x:0,y:0,z:0}]
  };
}

function externalCell(s){
  return opposite[s.active];
}

function allNeighborIds(s){
  return s.axes.flatMap(p => [p.plus, p.minus]);
}

function fieldVec(s){
  return objToVec(s.field);
}

function fogStrengthAt(pos, center=null){
  const c = center || fieldVec(state);
  const d = pos.distanceTo(c);
  const near = 0.15;
  const far = 4.2;
  const t = Math.max(0, Math.min(1, (d - near) / (far - near)));
  return 1 - fogStrength * t * t;
}

function applyLocalFog(){
  if(!state) return;
  const center = fieldVec(state);

  for(const id of allIds){
    const g = cells.get(id);
    const isExternal = id === externalCell(state);
    if(!g || isExternal || !g.visible) continue;
    const fog = fogStrengthAt(g.position, center);
    const ed = g.getObjectByName("edges");
    const labelSprite = g.getObjectByName("label");
    ed.material.opacity = 0.75 * fog;
    labelSprite.material.opacity = fog;
  }

  const fg = fieldGroup.children;
  if(fg[0] && fg[0].material) fg[0].material.opacity = 0.16 * (1 - 0.35 * fogStrength);
  if(fg[1] && fg[1].material) fg[1].material.opacity = 0.45 * (1 - 0.20 * fogStrength);

  for(const child of trailGroup.children){
    if(child.isMesh){
      const fog = fogStrengthAt(child.position, center);
      child.material.transparent = true;
      child.material.opacity = 0.9 * fog;
    } else if(child.isLine){
      child.material.transparent = true;
      child.material.opacity = 0.55 * (1 - 0.25 * fogStrength);
    }
  }

  for(const child of projectionGroup.children){
    const fog = fogStrengthAt(child.position, center);
    child.material.transparent = true;
    child.material.opacity = 0.95 * fog;
  }
}

function rebuildProjections(){
  clearGroup(projectionGroup);
  if(!state || !fieldVisible) return;

  const half = (fieldSize - 1) / 2;
  const p = fieldVec(state);
  const eps = 0.01;
  const r = 0.12;
  const geo = new THREE.CircleGeometry(r, 24);

  const specs = [
    {pos:[-half + eps, p.y, p.z], rot:[0, Math.PI/2, 0]},
    {pos:[ half - eps, p.y, p.z], rot:[0,-Math.PI/2, 0]},
    {pos:[ p.x, -half + eps, p.z], rot:[ Math.PI/2, 0, 0]},
    {pos:[ p.x,  half - eps, p.z], rot:[-Math.PI/2, 0, 0]},
    {pos:[ p.x, p.y, -half + eps], rot:[0,0,0]},
    {pos:[ p.x, p.y,  half - eps], rot:[0,Math.PI,0]}
  ];

  for(const spec of specs){
    const mat = new THREE.MeshBasicMaterial({color:0xff3b30, side:THREE.DoubleSide});
    const m = new THREE.Mesh(geo, mat);
    m.position.set(...spec.pos);
    m.rotation.set(...spec.rot);
    projectionGroup.add(m);
  }

  applyLocalFog();
}

function currentPositionFor(id, s){
  const base = fieldVec(s);

  if(id === s.active) return base;
  if(id === externalCell(s)) return base.clone().add(new THREE.Vector3(2.35, 1.45, 0));

  for(let i=0;i<3;i++){
    if(s.axes[i].plus === id) return base.clone().add(dirVectors[i].clone().multiplyScalar(spacing));
    if(s.axes[i].minus === id) return base.clone().add(dirVectors[i].clone().multiplyScalar(-spacing));
  }

  return base.clone().add(new THREE.Vector3(2.35, -1.45, 0));
}

function localDirFor(id, s){
  if(id === s.active) return new THREE.Vector3(0,0,0);

  for(let i=0;i<3;i++){
    if(s.axes[i].plus === id) return dirVectors[i].clone();
    if(s.axes[i].minus === id) return dirVectors[i].clone().negate();
  }

  return null;
}

function inBounds(v){
  const limit = (fieldSize - 1) / 2;
  return Math.abs(v.x) <= limit && Math.abs(v.y) <= limit && Math.abs(v.z) <= limit;
}

function makeTex(lines, main=96, sub=26){
  const c=document.createElement("canvas");
  c.width=c.height=256;
  const x=c.getContext("2d");
  x.clearRect(0,0,256,256);
  x.textAlign="center";
  x.textBaseline="middle";
  x.fillStyle="#fff";
  const a=Array.isArray(lines)?lines:[String(lines)];
  x.font=`800 ${main}px system-ui`;
  x.fillText(a[0],128,106);
  x.font=`650 ${sub}px system-ui`;
  x.fillText(a[1]||"",128,172);
  const t=new THREE.CanvasTexture(c);
  t.minFilter=THREE.LinearFilter;
  t.magFilter=THREE.LinearFilter;
  return t;
}

function setLabel(id,line){
  const s=cells.get(id).getObjectByName("label");
  if(s.material.map) s.material.map.dispose();
  s.material.map = makeTex(String(id));
  s.material.needsUpdate = true;
}

function createCell(id){
  const g = new THREE.Group();
  g.userData.id = id;

  const bodyMat = new THREE.MeshPhongMaterial({
    color: colors[id],
    transparent: true,
    opacity: .30,
    side: THREE.DoubleSide,
    depthWrite: false,
    shininess: 45
  });

  const cube = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), bodyMat);
  cube.name = "body";
  g.add(cube);

  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(1,1,1)),
    new THREE.LineBasicMaterial({color:colors[id], transparent:true, opacity:.75})
  );
  edges.name = "edges";
  g.add(edges);

  const sp = new THREE.Sprite(new THREE.SpriteMaterial({
    map: makeTex(String(id)),
    transparent: true,
    depthTest: false
  }));
  sp.name = "label";
  sp.scale.set(.54,.54,.54);
  g.add(sp);

  scene.add(g);
  cells.set(id,g);
}

for(const id of allIds) createCell(id);

function applyStateVisual(s){
  clearGroup(edgeGroup);

  for(const id of allIds){
    const g = cells.get(id);
    g.position.copy(currentPositionFor(id,s));
    g.quaternion.set(0,0,0,1);

    const body = g.getObjectByName("body");
    const ed = g.getObjectByName("edges");

    const isActive = id === s.active;
    const isExternal = id === externalCell(s);

    g.visible = !isExternal;

    body.material.opacity = 0.0;
    ed.material.color.set(0xaebdca);
    ed.material.opacity = .75;

    const labelSprite = g.getObjectByName("label");
    labelSprite.visible = !isExternal;
    labelSprite.material.opacity = isExternal ? 0.0 : 1.0;

    let label = "";
    if(isActive) label = "активный";
    else if(isExternal) label = "";
    else label = "сосед " + s.active;
    setLabel(id,label);
  }

  rebuildTrail();
  rebuildProjections();
  applyLocalFog();
  updateButtons();
  updateInfo();
}

function updateButtons(){
  const labels = [
    ["btnLeft", 0, -1, "ВЛЕВО"],
    ["btnRight", 0, 1, "ВПРАВО"],
    ["btnUp", 1, 1, "ВВЕРХ"],
    ["btnDown", 1, -1, "ВНИЗ"],
    ["btnForward", 2, 1, "ВПЕРЁД"],
    ["btnBack", 2, -1, "НАЗАД"]
  ];
  for(const [id, axis, sign, txt] of labels){
    const b = document.getElementById(id);
    const target = sign > 0 ? state.axes[axis].plus : state.axes[axis].minus;
    const nextField = objToVec(state.field).add(dirVectors[axis].clone().multiplyScalar(sign));
    b.textContent = `${txt} ${state.active}→${target}`;
    b.disabled = busy || !inBounds(nextField);
  }
}

function addAxisLine(edgeName, pivot, axis){
  return;
}

function rotateAround(object, pivot, axis, angle){
  const q = new THREE.Quaternion().setFromAxisAngle(axis, angle);
  object.position.sub(pivot).applyQuaternion(q).add(pivot);
  object.quaternion.premultiply(q);
}

function makeNextState(s, axisIndex, sign){
  const A = s.active;
  const B = sign > 0 ? s.axes[axisIndex].plus : s.axes[axisIndex].minus;
  const enter = opposite[A];

  const field = objToVec(s.field).add(dirVectors[axisIndex].clone().multiplyScalar(sign));

  const next = {
    active: B,
    axes: cloneAxes(s.axes),
    field: vecToObj(field),
    path: [...s.path, B],
    fieldPath: [...s.fieldPath.map(p => ({...p})), vecToObj(field)]
  };

  if(sign > 0){
    next.axes[axisIndex] = {plus: enter, minus: A};
  } else {
    next.axes[axisIndex] = {plus: A, minus: enter};
  }

  return next;
}

function commonSpinners(s, axisIndex){
  const arr = [];
  for(let i=0;i<3;i++){
    if(i === axisIndex) continue;
    arr.push(s.axes[i].plus, s.axes[i].minus);
  }
  return arr;
}

function runMove(axisIndex, sign){
  if(busy) return;

  const nextField = objToVec(state.field).add(dirVectors[axisIndex].clone().multiplyScalar(sign));
  if(!inBounds(nextField)){
    updateInfo({blocked:true, axisIndex, sign, nextField});
    return;
  }

  const A = state.active;
  const B = sign > 0 ? state.axes[axisIndex].plus : state.axes[axisIndex].minus;
  const enter = opposite[A];
  const out = opposite[B];
  const next = makeNextState(state, axisIndex, sign);
  const bDir = dirVectors[axisIndex].clone().multiplyScalar(sign);
  const spinners = commonSpinners(state, axisIndex);
  const base = fieldVec(state);

  history.push(cloneState(state));
  busy = true;
  clearGroup(edgeGroup);

  setLabel(A, "старый активный");
  setLabel(B, "новый активный");

  // Анимация смены внешнего кубика:
  // enter (бывший внешний) заранее ставим на его конечное место и плавно проявляем,
  // out (будущий внешний) плавно гасим на текущем месте.
  const enterGroup = cells.get(enter);
  const enterEdges = enterGroup.getObjectByName("edges");
  const enterLabel = enterGroup.getObjectByName("label");
  enterGroup.visible = true;
  enterGroup.position.copy(currentPositionFor(enter, next));
  enterGroup.quaternion.set(0,0,0,1);
  enterEdges.material.opacity = 0.0;
  enterLabel.visible = true;
  enterLabel.material.opacity = 0.0;
  setLabel(enter, "входит");

  const outGroup = cells.get(out);
  const outEdges = outGroup.getObjectByName("edges");
  const outLabel = outGroup.getObjectByName("label");
  const outStartOpacity = outEdges.material.opacity;
  outLabel.visible = true;
  outLabel.material.opacity = 1.0;
  setLabel(out, "выходит");

  const per = {};
  for(const S of spinners){
    const sDir = localDirFor(S, state);
    const pivot = base.clone().add(bDir.clone().add(sDir).multiplyScalar(h));
    const start = base.clone().add(sDir.clone().multiplyScalar(spacing));
    const target = base.clone().add(bDir.clone().add(sDir).multiplyScalar(spacing));

    const v0 = start.clone().sub(pivot);
    const v1 = target.clone().sub(pivot);
    const axis = new THREE.Vector3().crossVectors(v0, v1).normalize();
    const angle = v0.angleTo(v1);
    const edgeName = `${A}${S}${B}`;

    per[S] = {pivot, axis, angle, done:0, edgeName};
    addAxisLine(edgeName, pivot, axis);

    setLabel(S, edgeName);
    cells.get(S).getObjectByName("body").material.opacity = 0.0;
  }

  updateInfo({
    A, B, enter, out, spinners,
    axisIndex, sign
  });

  updateButtons();

  function rotatePhase(){
    let finished = true;

    for(const S of spinners){
      const p = per[S];
      const rest = p.angle - p.done;
      if(rest > 1e-5){
        const da = Math.min(rollStep, rest);
        rotateAround(cells.get(S), p.pivot, p.axis, da);
        p.done += da;
        finished = false;
      }
    }

    // Одновременно со вращением меняем яркость entering/outgoing кубиков.
    const sample = per[spinners[0]];
    const fade = sample ? Math.min(1, sample.done / sample.angle) : 1;
    enterEdges.material.opacity = 0.75 * fade;
    enterLabel.material.opacity = fade;
    outEdges.material.opacity = outStartOpacity * (1 - fade);
    outLabel.material.opacity = (1 - fade);

    if(!finished){
      requestAnimationFrame(rotatePhase);
      return;
    }

    recenterPhase(next, {A,B,enter,out,spinners});
  }

  rotatePhase();
}

function recenterPhase(next, moveInfo){
  // Переход к новой конфигурации делаем сразу, без дополнительной фазы плавного
  // перемещения скрытого внешнего кубика.
  state = next;
  applyStateVisual(state);
  busy = false;
  updateButtons();

  updateInfo({
    ...moveInfo,
    done:true,
    spinners: moveInfo.spinners
  });
}

function undo(){
  if(busy || history.length === 0) return;
  state = history.pop();
  applyStateVisual(state);
}

function reset(){
  if(busy) return;
  history = [];
  state = initialState();
  applyStateVisual(state);
}

function rebuildField(){
  clearGroup(fieldGroup);

  const half = (fieldSize - 1) / 2;
  const pts = [];

  for(let y=-half; y<=half; y++){
    for(let z=-half; z<=half; z++){
      pts.push(new THREE.Vector3(-half,y,z), new THREE.Vector3(half,y,z));
    }
  }
  for(let x=-half; x<=half; x++){
    for(let z=-half; z<=half; z++){
      pts.push(new THREE.Vector3(x,-half,z), new THREE.Vector3(x,half,z));
    }
  }
  for(let x=-half; x<=half; x++){
    for(let y=-half; y<=half; y++){
      pts.push(new THREE.Vector3(x,y,-half), new THREE.Vector3(x,y,half));
    }
  }

  const geom = new THREE.BufferGeometry().setFromPoints(pts);
  const lines = new THREE.LineSegments(
    geom,
    new THREE.LineBasicMaterial({color:0x4d6b86, transparent:true, opacity:.22})
  );
  fieldGroup.add(lines);

  const box = new THREE.BoxGeometry(fieldSize, fieldSize, fieldSize);
  const edges = new THREE.EdgesGeometry(box);
  const border = new THREE.LineSegments(
    edges,
    new THREE.LineBasicMaterial({color:0x7ac8ff, transparent:true, opacity:.65})
  );
  fieldGroup.add(border);

  fieldGroup.visible = fieldVisible;
  rebuildProjections();
  applyLocalFog();
}

function rebuildTrail(){
  clearGroup(trailGroup);
  trailGroup.visible = trailVisible;
  if(!trailVisible) return;

  const path = state.fieldPath.map(objToVec);
  if(path.length === 0) return;

  const sphereGeo = new THREE.SphereGeometry(.08, 16, 12);
  const matStart = new THREE.MeshBasicMaterial({color:0x86efac});
  const matTrail = new THREE.MeshBasicMaterial({color:0xffd166});

  for(let i=0; i<path.length; i++){
    const m = new THREE.Mesh(sphereGeo, i===path.length-1 ? matStart : matTrail);
    m.position.copy(path[i]);
    trailGroup.add(m);
  }

  if(path.length >= 2){
    const geom = new THREE.BufferGeometry().setFromPoints(path);
    const line = new THREE.Line(
      geom,
      new THREE.LineBasicMaterial({color:0xffd166, transparent:true, opacity:.55})
    );
    trailGroup.add(line);
  }

  applyLocalFog();
}

function applyFieldSize(){
  if(busy) return;

  let v = parseInt(document.getElementById("fieldSizeInput").value, 10);
  if(Number.isNaN(v)) return;
  v = Math.max(3, Math.min(9, v));
  if(v % 2 === 0) v += 1;
  if(v > 9) v = 9;

  fieldSize = v;
  document.getElementById("fieldSizeInput").value = String(v);
  rebuildField();
  reset();
}

function updateInfo(move=null){
  const el = document.getElementById("info");
  const p = state.field;
  el.textContent = [
    `${state.active}   (${p.x}, ${p.y}, ${p.z})`,
    `X +${state.axes[0].plus}  -${state.axes[0].minus}`,
    `Y +${state.axes[1].plus}  -${state.axes[1].minus}`,
    `Z +${state.axes[2].plus}  -${state.axes[2].minus}`,
    state.path.join(" → ")
  ].join("\n");
}

document.querySelectorAll("button[data-axis]").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    runMove(parseInt(btn.dataset.axis,10), parseInt(btn.dataset.sign,10));
  });
});

document.getElementById("undoBtn").addEventListener("click", undo);
document.getElementById("resetBtn").addEventListener("click", reset);
document.getElementById("applyFieldBtn").addEventListener("click", applyFieldSize);

document.getElementById("trailCheckbox").addEventListener("change", e=>{
  trailVisible = e.target.checked;
  rebuildTrail();
});

document.getElementById("fogStrengthInput").addEventListener("input", e=>{
  fogStrength = parseInt(e.target.value, 10) / 100;
  applyLocalFog();
});

document.getElementById("toggleFieldBtn").addEventListener("click", ()=>{
  fieldVisible = !fieldVisible;
  fieldGroup.visible = fieldVisible;
  rebuildProjections();
  applyLocalFog();
});

window.addEventListener("keydown", e=>{
  if(e.repeat) return;
  if(e.key === "ArrowLeft") runMove(0,-1);
  if(e.key === "ArrowRight") runMove(0,1);
  if(e.key === "PageUp") runMove(1,1);
  if(e.key === "PageDown") runMove(1,-1);
  if(e.key === "ArrowUp") runMove(2,1);
  if(e.key === "ArrowDown") runMove(2,-1);
  if(e.key === "Backspace") undo();
});

window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

function loop(){
  requestAnimationFrame(loop);
  controls.update();
  renderer.render(scene,camera);
}

rebuildField();
reset();
loop();
</script>
</body>
</html>
