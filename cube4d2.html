<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>4D cube roller — universal mobile annotated for Codex</title>
<style>
:root{--bg0:#0d1117;--bg1:#172033;--panel:rgba(8,12,20,.92);--panel2:rgba(22,31,48,.82);--line:rgba(151,190,235,.24);--text:#eaf3ff;--muted:#abc2dc;--accent:#4da6ff;--gold:#d69e2e;--green:#14815f;--danger:#475569}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at 18% 16%,#263a60 0%,transparent 42%),radial-gradient(circle at 84% 78%,#1d304d 0%,transparent 45%),linear-gradient(140deg,var(--bg0),var(--bg1));color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overscroll-behavior:none}
body{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;touch-action:none}
body>canvas{order:1;flex:1 1 auto;min-width:0;min-height:0;width:100%;height:100%;display:block;touch-action:none}
#panel{position:relative;order:2;z-index:5;flex:0 0 auto;width:100%;max-height:min(50svh,380px);overflow:auto;padding:9px max(10px,env(safe-area-inset-right)) max(10px,env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-left));background:var(--panel);border-top:1px solid var(--line);box-shadow:0 -4px 16px rgba(0,0,0,.25);display:grid;grid-template-columns:minmax(0,1.2fr) minmax(0,.8fr);gap:7px;backdrop-filter:blur(10px)}
#uiToggle{position:absolute;left:calc(8px + env(safe-area-inset-left));top:calc(8px + env(safe-area-inset-top));z-index:6;width:auto;min-width:52px;min-height:42px;padding:0 12px;border:0;border-radius:11px;background:#334155;color:white;font-weight:800;cursor:pointer;font-size:12px;opacity:.9;box-shadow:0 8px 20px rgba(0,0,0,.28)}
body.ui-hidden #panel{display:none}
.control-section{display:grid;gap:6px}
.move-pad{grid-row:span 3;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));grid-template-rows:repeat(3,minmax(42px,1fr));grid-template-areas:"up up up" "left forward right" "down back back";gap:6px;height:100%}
#btnUp{grid-area:up}#btnLeft{grid-area:left}#btnForward{grid-area:forward}#btnRight{grid-area:right}#btnDown{grid-area:down}#btnBack{grid-area:back}
.actions,.settings,.field-control{grid-template-columns:1fr;gap:6px}
button{min-height:42px;border:0;border-radius:10px;background:var(--accent);color:white;font-weight:800;cursor:pointer;font-size:12px;line-height:1.05;padding:0 6px;touch-action:manipulation}
button.secondary{background:var(--danger)}
button.gold{background:var(--gold)}
button.green{background:var(--green)}
button:disabled{opacity:.42;cursor:not-allowed}
label{display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:38px;padding:0 8px;border-radius:8px;background:var(--panel2);border:1px solid rgba(151,190,235,.14);color:#dbeafe;font-size:11px;font-weight:700}
input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent)}
input[type=number]{width:100%;min-height:38px;border:1px solid rgba(151,190,235,.28);border-radius:8px;background:#101827;color:var(--text);font-size:16px;font-weight:800;text-align:center}
#info{grid-column:1/-1;font-size:10px;line-height:1.18;color:#cfe4ff;white-space:pre-line;max-height:50px;overflow:hidden;padding:7px;border-radius:8px;background:rgba(8,12,20,.45);border:1px solid rgba(151,190,235,.12);opacity:.82}
@media(min-width:801px) and (orientation:portrait){
  #panel{grid-template-columns:minmax(0,1.2fr) repeat(3,minmax(0,.8fr));align-items:stretch;max-height:220px;padding-top:10px}
  .move-pad{grid-row:auto}.actions,.settings,.field-control{grid-template-columns:1fr}.field-control{align-content:stretch}
  #info{display:block;grid-column:1/-1;font-size:12px;line-height:1.35;max-height:64px}
}
@media(max-width:480px){
  #panel{max-height:min(48svh,350px);grid-template-columns:1fr 1fr;gap:6px;padding:7px max(7px,env(safe-area-inset-right)) max(7px,env(safe-area-inset-bottom)) max(7px,env(safe-area-inset-left))}
  .move-pad{grid-template-rows:repeat(3,38px)}
  button{min-height:38px;font-size:11px;padding:0 4px}
  label{min-height:34px;font-size:10px}
  input[type=number]{min-height:34px;font-size:15px}
  #info{display:none}
}
@media(max-width:360px){
  #panel{max-height:44svh}.move-pad{grid-template-rows:repeat(3,34px)}button{min-height:34px;font-size:10px}
}
@media(orientation:landscape){
  body{flex-direction:row}
  body>canvas{width:auto;height:100%}
  #panel{order:2;width:clamp(168px,24vw,320px);height:100%;max-height:none;flex:0 0 clamp(168px,24vw,320px);grid-template-columns:1fr;align-content:center;overflow-y:auto;padding:max(10px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right)) max(10px,env(safe-area-inset-bottom)) 10px;border-top:0;border-left:1px solid var(--line);box-shadow:-4px 0 16px rgba(0,0,0,.25)}
  .move-pad{grid-row:auto;height:auto;grid-template-rows:repeat(3,minmax(36px,auto))}
  .actions{grid-template-columns:1fr}.settings{grid-template-columns:1fr}.field-control{grid-template-columns:1fr}
  #info{display:none}
}
</style>
</head>
<body>
<button id="uiToggle" aria-label="Показать или скрыть панель">UI</button>
<div id="panel">
  <div class="control-section move-pad">
    <button data-axis="1" data-sign="1" id="btnUp">↑ Вверх</button>
    <button data-axis="0" data-sign="-1" id="btnLeft">← Влево</button>
    <button data-axis="2" data-sign="1" id="btnForward">Вперёд</button>
    <button data-axis="0" data-sign="1" id="btnRight">Вправо →</button>
    <button data-axis="1" data-sign="-1" id="btnDown">↓ Вниз</button>
    <button data-axis="2" data-sign="-1" id="btnBack">Назад</button>
  </div>
  <div class="control-section actions">
    <button id="undoBtn" class="green">Отмена</button>
    <button id="resetBtn" class="secondary">Сброс</button>
    <button id="toggleFieldBtn" class="secondary">Поле</button>
  </div>
  <div class="control-section settings">
    <label><span>Путь</span><input id="trailCheckbox" type="checkbox"></label>
    <label><span>Размер</span><input id="fieldSizeInput" type="number" min="3" max="9" step="2" value="7"></label>
  </div>
  <div class="control-section field-control">
    <button id="applyFieldBtn" class="gold">Применить</button>
  </div>
  <div id="info"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
"use strict";

const spacing = 1.0;
const h = 0.5;
const rollStep = 0.045;

const colors = {
  0:0xd8e1ea, 1:0xd8e1ea, 2:0xd8e1ea, 3:0xd8e1ea,
  4:0xd8e1ea, 5:0xd8e1ea, 6:0xd8e1ea, 7:0xd8e1ea
};

const allIds = [0,1,2,3,4,5,6,7];
const opposite = {0:7,7:0,1:6,6:1,2:5,5:2,3:4,4:3};
const dirVectors = [
  new THREE.Vector3(1,0,0),
  new THREE.Vector3(0,1,0),
  new THREE.Vector3(0,0,-1)
];
const axisNames = ["X", "Y", "Z"];

let fieldSize = 7;
let fogStrength = 0.00;
let state = null;
let history = [];
let busy = false;
let edgesVisible = false;
let trailVisible = false;
let fieldVisible = true;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(48, 1, .1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setClearColor(0x111827, 1);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = .08;

function getRenderSize(){
  const canvas = renderer.domElement;
  return {
    width: Math.max(1, canvas.clientWidth || innerWidth),
    height: Math.max(1, canvas.clientHeight || innerHeight)
  };
}

function resizeRendererToCanvas(){
  const {width, height} = getRenderSize();
  camera.aspect = width / height;
  renderer.setPixelRatio(Math.min(devicePixelRatio || 1, width < 800 ? 1.35 : 2));
  renderer.setSize(width, height, false);
  camera.updateProjectionMatrix();
}

function setCameraForViewport(){
  const {width, height} = getRenderSize();
  const compact = width < 800 || height < 520;
  if(compact){
    camera.position.set(-5.2, 4.25, 7.0);
    camera.fov = width < 420 ? 58 : 54;
    controls.target.set(0,.55,0);
  } else {
    camera.position.set(-7.5, 6.5, 9.2);
    camera.fov = 48;
    controls.target.set(0,.25,0);
  }
  camera.updateProjectionMatrix();
  camera.lookAt(controls.target);
}

function layoutScene(){
  resizeRendererToCanvas();
  setCameraForViewport();
  resizeRendererToCanvas();
}

scene.add(new THREE.AmbientLight(0xffffff, .72));
const light = new THREE.DirectionalLight(0xffffff, .92);
light.position.set(7,10,8);
scene.add(light);
const fill = new THREE.DirectionalLight(0x88bfff, .32);
fill.position.set(-8,5,-7);
scene.add(fill);

const cells = new Map();
const edgeGroup = new THREE.Group();
const trailGroup = new THREE.Group();
const fieldGroup = new THREE.Group();
const projectionGroup = new THREE.Group();
scene.add(fieldGroup);
scene.add(projectionGroup);
scene.add(trailGroup);
scene.add(edgeGroup);

function clearGroup(group){
  while(group.children.length){
    const child = group.children.pop();
    if(child.geometry) child.geometry.dispose?.();
    if(child.material){
      const mats = Array.isArray(child.material) ? child.material : [child.material];
      for(const m of mats){
        if(m.map) m.map.dispose?.();
        m.dispose?.();
      }
    }
  }
}

function cloneAxes(axes){
  return axes.map(p => ({plus:p.plus, minus:p.minus}));
}

function vecToObj(v){
  return {x:v.x, y:v.y, z:v.z};
}

function objToVec(o){
  return new THREE.Vector3(o.x, o.y, o.z);
}

function identityOrientations(){
  const map = {};
  for(const id of allIds) map[id] = {x:0,y:0,z:0,w:1};
  return map;
}

function cloneOrientations(orientations){
  const out = {};
  for(const id of allIds){
    const q = orientations?.[id] || {x:0,y:0,z:0,w:1};
    out[id] = {x:q.x, y:q.y, z:q.z, w:q.w};
  }
  return out;
}

function quatToObj(q){
  return {x:q.x, y:q.y, z:q.z, w:q.w};
}

function objToQuat(o){
  return new THREE.Quaternion(o.x, o.y, o.z, o.w);
}

function identityPendingNormals(){
  const map = {};
  for(const id of allIds) map[id] = null;
  return map;
}

function clonePendingNormals(pending){
  const out = {};
  for(const id of allIds){
    const n = pending?.[id] || null;
    out[id] = n ? {x:n.x, y:n.y, z:n.z} : null;
  }
  return out;
}

function reflectionLinearMatrix(normal){
  const n = normal.clone().normalize();
  const nx = n.x, ny = n.y, nz = n.z;
  return new THREE.Matrix4().set(
    1 - 2*nx*nx,    -2*nx*ny,    -2*nx*nz, 0,
       -2*ny*nx, 1 - 2*ny*ny,    -2*ny*nz, 0,
       -2*nz*nx,    -2*nz*ny, 1 - 2*nz*nz, 0,
              0,           0,           0, 1
  );
}

function rotationFromTwoReflections(detachNormalObj, attachNormal){
  if(!detachNormalObj) return new THREE.Quaternion();
  const nDetach = objToVec(detachNormalObj).normalize();
  const nAttach = attachNormal.clone().normalize();
  const mDetach = reflectionLinearMatrix(nDetach);
  const mAttach = reflectionLinearMatrix(nAttach);
  const m = mAttach.multiply(mDetach);
  return new THREE.Quaternion().setFromRotationMatrix(m).normalize();
}

function cloneState(s){
  return {
    active: s.active,
    axes: cloneAxes(s.axes),
    field: {...s.field},
    path: [...s.path],
    fieldPath: s.fieldPath.map(p => ({...p})),
    orientations: cloneOrientations(s.orientations),
    pendingNormals: clonePendingNormals(s.pendingNormals)
  };
}

function initialState(){
  return {
    active: 0,
    axes: [
      {plus:3, minus:4},
      {plus:1, minus:6},
      {plus:2, minus:5}
    ],
    field: {x:0, y:0, z:0},
    path: [0],
    fieldPath: [{x:0,y:0,z:0}],
    orientations: identityOrientations(),
    pendingNormals: identityPendingNormals()
  };
}

function externalCell(s){
  return opposite[s.active];
}

function allNeighborIds(s){
  return s.axes.flatMap(p => [p.plus, p.minus]);
}

function fieldVec(s){
  return objToVec(s.field);
}

function fogStrengthAt(pos, center=null){
  const c = center || fieldVec(state);
  const d = pos.distanceTo(c);
  const near = 0.0;
  const far = 2.25;
  const t = Math.max(0, Math.min(1, (d - near) / (far - near)));
  return Math.max(0.10, 1 - fogStrength * t);
}

function applyLocalFog(){
  if(!state) return;
  for(const id of allIds){
    const g = cells.get(id);
    const isExternal = id === externalCell(state);
    if(!g || isExternal || !g.visible) continue;
    const ed = g.getObjectByName("edges");
    const baseOpacity = g.userData.baseEdgeOpacity ?? 0.70;
    const baseColor = g.userData.baseEdgeColor ?? 0xaebdca;
    ed.material.color.set(baseColor);
    ed.material.opacity = baseOpacity;
  }
  const fg = fieldGroup.children;
  if(fg[0] && fg[0].material) fg[0].material.opacity = 0.52;
  for(const child of trailGroup.children){
    if(child.isMesh){
      child.material.transparent = true;
      child.material.opacity = 0.9;
    } else if(child.isLine){
      child.material.transparent = true;
      child.material.opacity = 0.45;
    }
  }
  for(const child of projectionGroup.children){
    child.material.transparent = true;
    child.material.opacity = 0.95;
  }
}

function rebuildProjections(){
  clearGroup(projectionGroup);
  if(!state || !fieldVisible) return;
  const half = (fieldSize - 1) / 2;
  const p = fieldVec(state);
  const r = 0.12;
  const geo = new THREE.CircleGeometry(r, 24);
  const specs = [
    {pos:[-half, p.y, p.z], rot:[0, Math.PI/2, 0]},
    {pos:[ half, p.y, p.z], rot:[0,-Math.PI/2, 0]},
    {pos:[ p.x,-half, p.z], rot:[ Math.PI/2, 0, 0]},
    {pos:[ p.x, half, p.z], rot:[-Math.PI/2, 0, 0]},
    {pos:[ p.x, p.y,-half], rot:[0,0,0]},
    {pos:[ p.x, p.y, half], rot:[0,Math.PI,0]}
  ];
  const projectionLineMaterial = new THREE.LineBasicMaterial({color:0xff3b30, transparent:true, opacity:.72});
  const projectionLines = [
    [new THREE.Vector3(-half, p.y, p.z), new THREE.Vector3( half, p.y, p.z)],
    [new THREE.Vector3( p.x,-half, p.z), new THREE.Vector3( p.x, half, p.z)],
    [new THREE.Vector3( p.x, p.y,-half), new THREE.Vector3( p.x, p.y, half)]
  ];
  for(const points of projectionLines){
    const line = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(points),
      projectionLineMaterial.clone()
    );
    projectionGroup.add(line);
  }
  for(const spec of specs){
    const mat = new THREE.MeshBasicMaterial({color:0xff3b30, side:THREE.DoubleSide});
    const m = new THREE.Mesh(geo, mat);
    m.position.set(...spec.pos);
    m.rotation.set(...spec.rot);
    projectionGroup.add(m);
  }
  applyLocalFog();
}

function currentPositionFor(id, s){
  const base = fieldVec(s);
  if(id === s.active) return base;
  if(id === externalCell(s)) return base.clone().add(new THREE.Vector3(2.35, 1.45, 0));
  for(let i=0;i<3;i++){
    if(s.axes[i].plus === id) return base.clone().add(dirVectors[i].clone().multiplyScalar(spacing));
    if(s.axes[i].minus === id) return base.clone().add(dirVectors[i].clone().multiplyScalar(-spacing));
  }
  return base.clone().add(new THREE.Vector3(2.35, -1.45, 0));
}

function localDirFor(id, s){
  if(id === s.active) return new THREE.Vector3(0,0,0);
  for(let i=0;i<3;i++){
    if(s.axes[i].plus === id) return dirVectors[i].clone();
    if(s.axes[i].minus === id) return dirVectors[i].clone().negate();
  }
  return null;
}

function inBounds(v){
  const limit = (fieldSize - 1) / 2;
  return Math.abs(v.x) <= limit && Math.abs(v.y) <= limit && Math.abs(v.z) <= limit;
}

function makeTex(lines, main=96, sub=26){
  const c=document.createElement("canvas");
  c.width=c.height=256;
  const x=c.getContext("2d");
  x.clearRect(0,0,256,256);
  x.textAlign="center";
  x.textBaseline="middle";
  x.fillStyle="#fff";
  const a=Array.isArray(lines)?lines:[String(lines)];
  x.font=`800 ${main}px system-ui`;
  x.fillText(a[0],128,106);
  x.font=`650 ${sub}px system-ui`;
  x.fillText(a[1]||"",128,172);
  const t=new THREE.CanvasTexture(c);
  t.minFilter=THREE.LinearFilter;
  t.magFilter=THREE.LinearFilter;
  return t;
}

function makeFaceTexture(id){
  const c=document.createElement("canvas");
  c.width=c.height=256;
  const x=c.getContext("2d");
  x.fillStyle="#d9e2eb";
  x.fillRect(0,0,256,256);
  x.fillStyle="#203040";
  x.textAlign="center";
  x.textBaseline="middle";
  x.font='700 120px system-ui';
  x.fillText(String(id),128,132);
  const t=new THREE.CanvasTexture(c);
  t.minFilter=THREE.LinearFilter;
  t.magFilter=THREE.LinearFilter;
  return t;
}

function makeMarkerTexture(symbol){
  const c=document.createElement("canvas");
  c.width=c.height=256;
  const x=c.getContext("2d");
  x.fillStyle="#d9e2eb";
  x.fillRect(0,0,256,256);
  x.fillStyle="#203040";
  x.textAlign="center";
  x.textBaseline="middle";
  x.font='700 140px system-ui';
  x.fillText(symbol,128,132);
  const t=new THREE.CanvasTexture(c);
  t.minFilter=THREE.LinearFilter;
  t.magFilter=THREE.LinearFilter;
  return t;
}

function setCubeOpacity(group, opacity){
  const body = group.getObjectByName("body");
  if(!body) return;
  const mats = Array.isArray(body.material) ? body.material : [body.material];
  for(const m of mats){
    m.transparent = opacity < 0.999;
    m.opacity = opacity;
  }
}

function setLabel(id,line){
  return;
}

function createCell(id){
  const g = new THREE.Group();
  g.userData.id = id;
  const sideTexture = makeFaceTexture(id);
  const topTexture = makeMarkerTexture("○");
  const bottomTexture = makeMarkerTexture("□");
  const rightTexture = makeMarkerTexture("△");
  const leftTexture = makeMarkerTexture("✕");
  const bodyMat = [
    new THREE.MeshPhongMaterial({color: colors[id], map: rightTexture, transparent: false, opacity: 1.0, side: THREE.DoubleSide, depthWrite: true, shininess: 35}),
    new THREE.MeshPhongMaterial({color: colors[id], map: leftTexture, transparent: false, opacity: 1.0, side: THREE.DoubleSide, depthWrite: true, shininess: 35}),
    new THREE.MeshPhongMaterial({color: colors[id], map: topTexture, transparent: false, opacity: 1.0, side: THREE.DoubleSide, depthWrite: true, shininess: 35}),
    new THREE.MeshPhongMaterial({color: colors[id], map: bottomTexture, transparent: false, opacity: 1.0, side: THREE.DoubleSide, depthWrite: true, shininess: 35}),
    new THREE.MeshPhongMaterial({color: colors[id], map: sideTexture, transparent: false, opacity: 1.0, side: THREE.DoubleSide, depthWrite: true, shininess: 35}),
    new THREE.MeshPhongMaterial({color: colors[id], map: sideTexture, transparent: false, opacity: 1.0, side: THREE.DoubleSide, depthWrite: true, shininess: 35})
  ];
  const cube = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), bodyMat);
  cube.name = "body";
  g.add(cube);
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(1,1,1)),
    new THREE.LineBasicMaterial({color:colors[id], transparent:true, opacity:.75})
  );
  edges.name = "edges";
  g.add(edges);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({map: makeTex(String(id)), transparent: true, depthTest: false, opacity: 0}));
  sp.name = "label";
  sp.visible = false;
  sp.scale.set(.01,.01,.01);
  g.add(sp);
  scene.add(g);
  cells.set(id,g);
}

for(const id of allIds) createCell(id);

function applyStateVisual(s){
  clearGroup(edgeGroup);
  for(const id of allIds){
    const g = cells.get(id);
    g.position.copy(currentPositionFor(id,s));
    g.quaternion.copy(objToQuat(s.orientations?.[id] || {x:0,y:0,z:0,w:1}));
    const ed = g.getObjectByName("edges");
    const isActive = id === s.active;
    const isExternal = id === externalCell(s);
    g.visible = !isExternal;
    setCubeOpacity(g, 1.0);
    g.userData.baseEdgeOpacity = isActive ? 1.00 : 0.65;
    g.userData.baseEdgeColor = isActive ? 0xffffff : 0xaebdca;
    ed.material.color.set(g.userData.baseEdgeColor);
    ed.material.opacity = g.userData.baseEdgeOpacity;
    const labelSprite = g.getObjectByName("label");
    labelSprite.visible = false;
    labelSprite.material.opacity = 0.0;
    let label = "";
    if(isActive) label = "активный";
    else if(isExternal) label = "";
    else label = "сосед " + s.active;
    setLabel(id,label);
  }
  rebuildTrail();
  rebuildProjections();
  applyLocalFog();
  updateButtons();
  updateInfo();
}

function updateButtons(){
  const labels = [
    ["btnLeft", 0, -1, "← Влево"],
    ["btnRight", 0, 1, "Вправо →"],
    ["btnUp", 1, 1, "↑ Вверх"],
    ["btnDown", 1, -1, "↓ Вниз"],
    ["btnForward", 2, 1, "Вперёд"],
    ["btnBack", 2, -1, "Назад"]
  ];
  for(const [id, axis, sign, txt] of labels){
    const b = document.getElementById(id);
    const nextField = objToVec(state.field).add(dirVectors[axis].clone().multiplyScalar(sign));
    b.textContent = txt;
    b.disabled = busy || !inBounds(nextField);
  }
}

function addAxisLine(edgeName, pivot, axis){
  return;
}

function rotateAround(object, pivot, axis, angle){
  const q = new THREE.Quaternion().setFromAxisAngle(axis, angle);
  object.position.sub(pivot).applyQuaternion(q).add(pivot);
  object.quaternion.premultiply(q);
}

function makeNextState(s, axisIndex, sign){
  const A = s.active;
  const B = sign > 0 ? s.axes[axisIndex].plus : s.axes[axisIndex].minus;
  const enter = opposite[A];
  const field = objToVec(s.field).add(dirVectors[axisIndex].clone().multiplyScalar(sign));
  const next = {
    active: B,
    axes: cloneAxes(s.axes),
    field: vecToObj(field),
    path: [...s.path, B],
    fieldPath: [...s.fieldPath.map(p => ({...p})), vecToObj(field)],
    orientations: cloneOrientations(s.orientations),
    pendingNormals: clonePendingNormals(s.pendingNormals)
  };
  if(sign > 0){
    next.axes[axisIndex] = {plus: enter, minus: A};
  } else {
    next.axes[axisIndex] = {plus: A, minus: enter};
  }
  return next;
}

function commonSpinners(s, axisIndex){
  const arr = [];
  for(let i=0;i<3;i++){
    if(i === axisIndex) continue;
    arr.push(s.axes[i].plus, s.axes[i].minus);
  }
  return arr;
}

function runMove(axisIndex, sign){
  if(busy) return;
  const nextField = objToVec(state.field).add(dirVectors[axisIndex].clone().multiplyScalar(sign));
  if(!inBounds(nextField)){
    updateInfo({blocked:true, axisIndex, sign, nextField});
    return;
  }
  const A = state.active;
  const B = sign > 0 ? state.axes[axisIndex].plus : state.axes[axisIndex].minus;
  const enter = opposite[A];
  const out = opposite[B];
  const next = makeNextState(state, axisIndex, sign);
  const bDir = dirVectors[axisIndex].clone().multiplyScalar(sign);
  const spinners = commonSpinners(state, axisIndex);
  const base = fieldVec(state);
  history.push(cloneState(state));
  busy = true;
  clearGroup(edgeGroup);
  setLabel(A, "старый активный");
  setLabel(B, "новый активный");
  cells.get(A).userData.baseEdgeOpacity = 1.00;
  cells.get(A).userData.baseEdgeColor = 0xffffff;
  cells.get(B).userData.baseEdgeOpacity = 0.65;
  cells.get(B).userData.baseEdgeColor = 0xaebdca;
  const enterGroup = cells.get(enter);
  const enterEdges = enterGroup.getObjectByName("edges");
  const enterLabel = enterGroup.getObjectByName("label");
  enterGroup.visible = true;
  enterGroup.position.copy(currentPositionFor(enter, next));
  enterGroup.quaternion.copy(objToQuat(state.orientations?.[enter] || {x:0,y:0,z:0,w:1}));
  const enterRotation = rotationFromTwoReflections(state.pendingNormals?.[enter], bDir);
  enterGroup.quaternion.premultiply(enterRotation);
  next.pendingNormals[enter] = null;
  enterEdges.material.opacity = 0.0;
  setCubeOpacity(enterGroup, 0.0);
  enterLabel.visible = false;
  enterLabel.material.opacity = 0.0;
  setLabel(enter, "входит");
  const outGroup = cells.get(out);
  const outEdges = outGroup.getObjectByName("edges");
  const outLabel = outGroup.getObjectByName("label");
  const outStartOpacity = outEdges.material.opacity;
  outLabel.visible = false;
  outLabel.material.opacity = 0.0;
  setLabel(out, "выходит");
  const per = {};
  for(const S of spinners){
    const sDir = localDirFor(S, state);
    const pivot = base.clone().add(bDir.clone().add(sDir).multiplyScalar(h));
    const start = base.clone().add(sDir.clone().multiplyScalar(spacing));
    const target = base.clone().add(bDir.clone().add(sDir).multiplyScalar(spacing));
    const v0 = start.clone().sub(pivot);
    const v1 = target.clone().sub(pivot);
    const axis = new THREE.Vector3().crossVectors(v0, v1).normalize();
    const angle = v0.angleTo(v1);
    const edgeName = `${A}${S}${B}`;
    per[S] = {pivot, axis, angle, done:0, edgeName};
    addAxisLine(edgeName, pivot, axis);
    setLabel(S, edgeName);
    setCubeOpacity(cells.get(S), 1.0);
  }
  updateInfo({A, B, enter, out, spinners, axisIndex, sign});
  updateButtons();
  function rotatePhase(){
    let finished = true;
    for(const S of spinners){
      const p = per[S];
      const rest = p.angle - p.done;
      if(rest > 1e-5){
        const da = Math.min(rollStep, rest);
        rotateAround(cells.get(S), p.pivot, p.axis, da);
        p.done += da;
        finished = false;
      }
    }
    const sample = per[spinners[0]];
    const fade = sample ? Math.min(1, sample.done / sample.angle) : 1;
    enterEdges.material.opacity = 0.75 * fade;
    setCubeOpacity(enterGroup, fade);
    enterLabel.material.opacity = 0.0;
    outEdges.material.opacity = outStartOpacity * (1 - fade);
    setCubeOpacity(outGroup, 1 - fade);
    outLabel.material.opacity = 0.0;
    const oldColor = new THREE.Color(0xffffff);
    const idleColor = new THREE.Color(0xaebdca);
    const aColor = oldColor.clone().lerp(idleColor, fade);
    const bColor = idleColor.clone().lerp(oldColor, fade);
    cells.get(A).userData.baseEdgeOpacity = 1.00 - 0.35 * fade;
    cells.get(B).userData.baseEdgeOpacity = 0.65 + 0.35 * fade;
    cells.get(A).userData.baseEdgeColor = aColor.getHex();
    cells.get(B).userData.baseEdgeColor = bColor.getHex();
    applyLocalFog();
    if(!finished){
      requestAnimationFrame(rotatePhase);
      return;
    }
    next.pendingNormals[out] = vecToObj(bDir.clone());
    recenterPhase(next, {A,B,enter,out,spinners});
  }
  rotatePhase();
}

function recenterPhase(next, moveInfo){
  next.orientations = {};
  for(const id of allIds){
    next.orientations[id] = quatToObj(cells.get(id).quaternion.clone());
  }
  state = next;
  applyStateVisual(state);
  busy = false;
  updateButtons();
  updateInfo({...moveInfo, done:true, spinners: moveInfo.spinners});
}

function undo(){
  if(busy || history.length === 0) return;
  state = history.pop();
  applyStateVisual(state);
}

function reset(){
  if(busy) return;
  history = [];
  state = initialState();
  applyStateVisual(state);
}

function rebuildField(){
  clearGroup(fieldGroup);
  const box = new THREE.BoxGeometry(fieldSize, fieldSize, fieldSize);
  const edges = new THREE.EdgesGeometry(box);
  const border = new THREE.LineSegments(
    edges,
    new THREE.LineBasicMaterial({color:0x7ac8ff, transparent:true, opacity:.52})
  );
  fieldGroup.add(border);
  fieldGroup.visible = fieldVisible;
  rebuildProjections();
  applyLocalFog();
}

function rebuildTrail(){
  clearGroup(trailGroup);
  trailGroup.visible = trailVisible;
  if(!trailVisible) return;
  const path = state.fieldPath.map(objToVec);
  if(path.length === 0) return;
  const sphereGeo = new THREE.SphereGeometry(.08, 16, 12);
  const matStart = new THREE.MeshBasicMaterial({color:0x86efac});
  const matTrail = new THREE.MeshBasicMaterial({color:0xffd166});
  for(let i=0; i<path.length; i++){
    const m = new THREE.Mesh(sphereGeo, i===path.length-1 ? matStart : matTrail);
    m.position.copy(path[i]);
    trailGroup.add(m);
  }
  if(path.length >= 2){
    const geom = new THREE.BufferGeometry().setFromPoints(path);
    const line = new THREE.Line(
      geom,
      new THREE.LineBasicMaterial({color:0xffd166, transparent:true, opacity:.55})
    );
    trailGroup.add(line);
  }
  applyLocalFog();
}

function applyFieldSize(){
  if(busy) return;
  let v = parseInt(document.getElementById("fieldSizeInput").value, 10);
  if(Number.isNaN(v)) return;
  v = Math.max(3, Math.min(9, v));
  if(v % 2 === 0) v += 1;
  if(v > 9) v = 9;
  fieldSize = v;
  document.getElementById("fieldSizeInput").value = String(v);
  rebuildField();
  reset();
}

function updateInfo(move=null){
  const el = document.getElementById("info");
  const p = state.field;
  el.textContent = [
    `${state.active}   (${p.x}, ${p.y}, ${p.z})`,
    `X +${state.axes[0].plus}  -${state.axes[0].minus}`,
    `Y +${state.axes[1].plus}  -${state.axes[1].minus}`,
    `Z +${state.axes[2].plus}  -${state.axes[2].minus}`,
    state.path.join(", ")
  ].join("\n");
}

document.getElementById("uiToggle").addEventListener("click", ()=>{
  document.body.classList.toggle("ui-hidden");
  requestAnimationFrame(layoutScene);
});

document.querySelectorAll("button[data-axis]").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    runMove(parseInt(btn.dataset.axis,10), parseInt(btn.dataset.sign,10));
  });
});

document.getElementById("undoBtn").addEventListener("click", undo);
document.getElementById("resetBtn").addEventListener("click", reset);
document.getElementById("applyFieldBtn").addEventListener("click", applyFieldSize);

document.getElementById("trailCheckbox").addEventListener("change", e=>{
  trailVisible = e.target.checked;
  rebuildTrail();
});

document.getElementById("toggleFieldBtn").addEventListener("click", ()=>{
  fieldVisible = !fieldVisible;
  fieldGroup.visible = fieldVisible;
  rebuildProjections();
  applyLocalFog();
});

window.addEventListener("keydown", e=>{
  if(e.repeat) return;
  if(e.key === "ArrowLeft") runMove(0,-1);
  if(e.key === "ArrowRight") runMove(0,1);
  if(e.key === "PageUp") runMove(1,1);
  if(e.key === "PageDown") runMove(1,-1);
  if(e.key === "ArrowUp") runMove(2,1);
  if(e.key === "ArrowDown") runMove(2,-1);
  if(e.key === "Backspace") undo();
});

if("ResizeObserver" in window){
  new ResizeObserver(layoutScene).observe(renderer.domElement);
}
window.addEventListener("resize", layoutScene);
window.addEventListener("orientationchange", layoutScene);

rebuildField();
reset();
layoutScene();

function loop(){
  requestAnimationFrame(loop);
  controls.update();
  applyLocalFog();
  renderer.render(scene,camera);
}
loop();
</script>
